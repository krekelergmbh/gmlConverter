name: Build

# Manuell auslösbar (Actions-Tab -> "Run workflow") und bei Versions-Tags v*.
# Nur ein Tag-Push (z. B. v1.0.0) erzeugt zusätzlich ein GitHub-Release.
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  # ---------------------------------------------------------------- macOS
  build-macos:
    # macos-14 = Apple Silicon (arm64). Schnelle Runner-Zuteilung.
    # Ergebnis läuft nativ auf Apple-Silicon-Macs (M1/M2/M3/M4);
    # auf alten Intel-Macs läuft die App NICHT.
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Abhängigkeiten installieren
        run: |
          python -m pip install --upgrade pip
          pip install -r citygml_converter/requirements.txt

      - name: App-Icon (.icns) aus kgp.ico erzeugen
        run: |
          python -c "from PIL import Image; Image.open('citygml_converter/__files__/kgp.ico').convert('RGBA').save('icon_master.png')"
          mkdir -p icon.iconset
          for pair in "16 16x16" "32 16x16@2x" "32 32x32" "64 32x32@2x" \
                      "128 128x128" "256 128x128@2x" "256 256x256" \
                      "512 256x256@2x" "512 512x512" "1024 512x512@2x"; do
            set -- $pair
            sips -z "$1" "$1" icon_master.png --out "icon.iconset/icon_$2.png"
          done
          iconutil -c icns icon.iconset -o citygml_converter/__files__/kgp.icns

      - name: Build mit PyInstaller
        run: pyinstaller gmlConverter.spec --noconfirm

      - name: Signier-Zertifikat in temporären Keychain importieren
        env:
          CERT_B64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          CERT_PW: ${{ secrets.APPLE_CERT_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PW="$(openssl rand -base64 24)"
          echo "$CERT_B64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security import "$RUNNER_TEMP/cert.p12" -P "$CERT_PW" -A -t cert -f pkcs12 -k "$KEYCHAIN"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PW" "$KEYCHAIN" >/dev/null
          security list-keychain -d user -s "$KEYCHAIN" login.keychain-db
          rm -f "$RUNNER_TEMP/cert.p12"

      - name: App signieren (codesign, Hardened Runtime)
        env:
          IDENTITY: ${{ secrets.APPLE_SIGN_IDENTITY }}
        run: |
          APP="dist/gmlConverter.app"
          # Zuerst alle eingebetteten Bibliotheken signieren ...
          find "$APP/Contents" \( -name "*.so" -o -name "*.dylib" \) -print0 \
            | while IFS= read -r -d '' f; do
                codesign --force --timestamp --options runtime \
                  --entitlements entitlements.plist -s "$IDENTITY" "$f"
              done
          # ... dann das App-Bundle selbst
          codesign --force --timestamp --options runtime \
            --entitlements entitlements.plist -s "$IDENTITY" "$APP"
          codesign --verify --deep --strict --verbose=2 "$APP"

      - name: Notarisieren und Ticket anheften (staple)
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_PW: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          cd dist
          ditto -c -k --keepParent gmlConverter.app gmlConverter-notarize.zip
          xcrun notarytool submit gmlConverter-notarize.zip \
            --apple-id "$APPLE_ID" --team-id "$TEAM_ID" --password "$APP_PW" --wait
          xcrun stapler staple gmlConverter.app
          xcrun stapler validate gmlConverter.app

      - name: Signierte .app als ZIP packen
        run: |
          cd dist
          zip -r -y gmlConverter-macos.zip gmlConverter.app

      - name: Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: gmlConverter-macos
          path: dist/gmlConverter-macos.zip
          if-no-files-found: error

  # -------------------------------------------------------------- Windows
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Abhängigkeiten installieren
        run: |
          python -m pip install --upgrade pip
          pip install -r citygml_converter/requirements.txt

      - name: Build mit PyInstaller
        run: pyinstaller gmlConverter.spec --noconfirm

      - name: Ordner als ZIP packen
        shell: pwsh
        run: Compress-Archive -Path dist/gmlConverter -DestinationPath gmlConverter-windows.zip

      - name: Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: gmlConverter-windows
          path: gmlConverter-windows.zip
          if-no-files-found: error

  # -------------------------------------------------------------- Release
  release:
    needs: [build-macos, build-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Artefakte herunterladen
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: GitHub-Release erstellen
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            artifacts/gmlConverter-macos/gmlConverter-macos.zip \
            artifacts/gmlConverter-windows/gmlConverter-windows.zip \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes
